name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Get dependencies
        run: |
          cd flutter-app
          pwd
          ls -la
          /opt/hostedtoolcache/flutter/3.19.0/stable/x64/bin/flutter pub get

      - name: Build Debug APK
        run: |
          cd flutter-app
          /opt/hostedtoolcache/flutter/3.19.0/stable/x64/bin/flutter build apk --debug

      - name: Build Release APK
        run: |
          cd flutter-app
          /opt/hostedtoolcache/flutter/3.19.0/stable/x64/bin/flutter build apk --release

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: flutter-app/build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: release-apk
          path: flutter-app/build/app/outputs/flutter-apk/app-release.apk
